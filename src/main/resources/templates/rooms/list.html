<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Rooms</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="container"><h2>Rooms</h2><a href="/rooms/new">Add Room</a><a href="/rooms/available">Available Rooms</a><a href="/">Home</a><table><tr><th>Room</th><th>Floor</th><th>Occupied</th><th>Max</th><th>AC</th><th>Pool</th><th>Gym</th><th>Action</th></tr><tr th:each="r:${rooms}"><td th:text="${r.roomNumber}"></td><td th:text="${r.floorNumber}"></td><td th:text="${r.isOccupied}"></td><td th:text="${r.maxOccupancy}"></td><td th:text="${r.hasAc}"></td><td th:text="${r.hasSwimmingPoolAccess}"></td><td th:text="${r.hasGymAccess}"></td><td><a th:href="@{/rooms/delete/{id}(id=${r.roomNumber})}">Delete</a></td></tr></table></div></body></html>
