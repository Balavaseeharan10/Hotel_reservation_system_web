<!DOCTYPE html><html><head><title>Add RI</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="container"><h2>Add RI Resident</h2><form action="/residents/ri/save" method="post">
<input name="residentName" placeholder="Resident Name" required>
<input name="age" type="number" placeholder="Age" required>
<input name="gender" placeholder="Gender" required>
<input name="contactNumber" type="number" placeholder="Contact Number" required>
<input name="email" type="email" placeholder="Email" required>
<input name="address" placeholder="Address" required>
<input name="numberOfAdults" type="number" placeholder="Adults" required>
<input name="numberOfChildrenAbove12" type="number" placeholder="Children Above 12" required>
<input name="numberOfChildrenAbove5" type="number" placeholder="Children Above 5" required>
<input name="durationOfStay" type="number" placeholder="Duration of Stay" required>
<input name="idproofAadharno" type="number" placeholder="Aadhar Number" required><button type="submit">Save</button></form><a href="/">Home</a></div></body></html>
