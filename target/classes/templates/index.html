<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hotel Reservation</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="home-bg">
<div class="container hero-container">
    <div class="hero">
        <h1>Hotel Reservation Management System</h1>
    </div>

    <div class="role-grid">
        <a class="role-card customer-card" href="/customer">
            <span class="role-icon">👤</span>
            <h2>Customer</h2>
            <p>Register resident, check available rooms, book room, and make payment.</p>
            <span class="card-button">Go to Customer Options</span>
        </a>

        <a class="role-card manager-card" href="/manager">
            <span class="role-icon">🏨</span>
            <h2>Manager</h2>
            <p>Manage rooms, view residents, bookings, payments, and availability.</p>
            <span class="card-button">Go to Manager Options</span>
        </a>
    </div>
</div>
</body>
</html>
